<svg width="680" height="560" viewBox="0 0 680 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Desktop dashboard and mobile app built by CodeOpposite">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#531D84"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="brandSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9333EA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#531D84" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#faf8fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#531D84" flood-opacity="0.18"/>
    </filter>
    <filter id="shadowSm" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#531D84" flood-opacity="0.22"/>
    </filter>
    <clipPath id="phoneScreen">
      <rect x="8" y="8" width="154" height="304" rx="28"/>
    </clipPath>
  </defs>

  <!-- decorative background blobs -->
  <circle cx="120" cy="110" r="90" fill="url(#brandSoft)"/>
  <circle cx="600" cy="470" r="120" fill="url(#brandSoft)"/>
  <path d="M40 470 q20 -40 60 -20" stroke="#9333EA" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- ===== Desktop window ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="70" width="460" height="320" rx="18" fill="url(#screen)" stroke="#531D84" stroke-opacity="0.10"/>
    <!-- title bar -->
    <path d="M60 88 a18 18 0 0 1 18 -18 h424 a18 18 0 0 1 18 18 v22 h-460 z" fill="#531D84"/>
    <circle cx="84" cy="92" r="5" fill="#ffffff" fill-opacity="0.85"/>
    <circle cx="104" cy="92" r="5" fill="#ffffff" fill-opacity="0.55"/>
    <circle cx="124" cy="92" r="5" fill="#ffffff" fill-opacity="0.35"/>
    <rect x="190" y="85" width="200" height="14" rx="7" fill="#ffffff" fill-opacity="0.18"/>

    <!-- sidebar -->
    <rect x="60" y="110" width="96" height="280" fill="#f3eefb"/>
    <rect x="78" y="134" width="60" height="9" rx="4.5" fill="#9333EA"/>
    <rect x="78" y="162" width="60" height="9" rx="4.5" fill="#531D84" fill-opacity="0.35"/>
    <rect x="78" y="186" width="60" height="9" rx="4.5" fill="#531D84" fill-opacity="0.25"/>
    <rect x="78" y="210" width="60" height="9" rx="4.5" fill="#531D84" fill-opacity="0.25"/>
    <rect x="78" y="234" width="44" height="9" rx="4.5" fill="#531D84" fill-opacity="0.2"/>

    <!-- top stat cards -->
    <rect x="174" y="128" width="100" height="58" rx="10" fill="#ffffff" stroke="#531D84" stroke-opacity="0.12"/>
    <rect x="186" y="142" width="40" height="8" rx="4" fill="#531D84" fill-opacity="0.3"/>
    <rect x="186" y="158" width="60" height="14" rx="6" fill="url(#brand)"/>
    <rect x="288" y="128" width="100" height="58" rx="10" fill="#ffffff" stroke="#531D84" stroke-opacity="0.12"/>
    <rect x="300" y="142" width="40" height="8" rx="4" fill="#531D84" fill-opacity="0.3"/>
    <rect x="300" y="158" width="52" height="14" rx="6" fill="#9333EA"/>
    <rect x="402" y="128" width="100" height="58" rx="10" fill="url(#brand)"/>
    <rect x="414" y="142" width="40" height="8" rx="4" fill="#ffffff" fill-opacity="0.6"/>
    <rect x="414" y="158" width="58" height="14" rx="6" fill="#ffffff"/>

    <!-- bar chart -->
    <rect x="174" y="202" width="190" height="170" rx="12" fill="#ffffff" stroke="#531D84" stroke-opacity="0.12"/>
    <rect x="190" y="218" width="70" height="9" rx="4.5" fill="#531D84" fill-opacity="0.35"/>
    <rect x="194" y="330" width="22" height="26" rx="4" fill="#531D84" fill-opacity="0.4"/>
    <rect x="226" y="306" width="22" height="50" rx="4" fill="#9333EA" fill-opacity="0.6"/>
    <rect x="258" y="288" width="22" height="68" rx="4" fill="#531D84" fill-opacity="0.5"/>
    <rect x="290" y="262" width="22" height="94" rx="4" fill="url(#brand)"/>
    <rect x="322" y="300" width="22" height="56" rx="4" fill="#9333EA" fill-opacity="0.7"/>

    <!-- line chart -->
    <rect x="376" y="202" width="126" height="170" rx="12" fill="#ffffff" stroke="#531D84" stroke-opacity="0.12"/>
    <rect x="392" y="218" width="60" height="9" rx="4.5" fill="#531D84" fill-opacity="0.35"/>
    <polyline points="392,330 414,300 436,318 458,272 480,290 498,250"
      fill="none" stroke="url(#brand)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="498" cy="250" r="5" fill="#9333EA"/>
    <path d="M392 330 L414 300 L436 318 L458 272 L480 290 L498 250 L498 356 L392 356 Z" fill="url(#brandSoft)"/>
  </g>

  <!-- ===== Mobile phone (overlapping, front-right) ===== -->
  <g filter="url(#shadowSm)" transform="translate(470 230)">
    <rect x="0" y="0" width="170" height="320" rx="34" fill="#531D84"/>
    <rect x="8" y="8" width="154" height="304" rx="28" fill="url(#screen)"/>
    <!-- inner UI clipped to the rounded screen so nothing overflows the corners -->
    <g clip-path="url(#phoneScreen)">
      <!-- app header -->
      <rect x="8" y="38" width="154" height="64" fill="url(#brand)"/>
      <rect x="26" y="58" width="70" height="10" rx="5" fill="#ffffff"/>
      <rect x="26" y="76" width="46" height="8" rx="4" fill="#ffffff" fill-opacity="0.6"/>
      <circle cx="138" cy="70" r="12" fill="#ffffff" fill-opacity="0.25"/>
      <!-- feature card -->
      <rect x="22" y="116" width="126" height="56" rx="12" fill="#f3eefb"/>
      <circle cx="44" cy="144" r="13" fill="url(#brand)"/>
      <rect x="66" y="134" width="64" height="9" rx="4.5" fill="#531D84" fill-opacity="0.5"/>
      <rect x="66" y="150" width="44" height="7" rx="3.5" fill="#531D84" fill-opacity="0.3"/>
      <!-- list rows -->
      <rect x="22" y="186" width="126" height="14" rx="7" fill="#531D84" fill-opacity="0.18"/>
      <rect x="22" y="208" width="100" height="14" rx="7" fill="#531D84" fill-opacity="0.13"/>
      <rect x="22" y="230" width="116" height="14" rx="7" fill="#531D84" fill-opacity="0.13"/>
      <!-- bottom nav -->
      <rect x="8" y="270" width="154" height="42" fill="#ffffff"/>
      <circle cx="42" cy="291" r="7" fill="url(#brand)"/>
      <circle cx="85" cy="291" r="7" fill="#531D84" fill-opacity="0.25"/>
      <circle cx="128" cy="291" r="7" fill="#531D84" fill-opacity="0.25"/>
    </g>
    <!-- notch sits on top, outside the clip -->
    <rect x="62" y="18" width="46" height="10" rx="5" fill="#531D84"/>
  </g>

  <!-- floating code badge -->
  <g filter="url(#shadowSm)" transform="translate(70 360)">
    <rect x="0" y="0" width="150" height="56" rx="14" fill="#1a1320"/>
    <text x="18" y="26" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#c4b5fd">&lt;/&gt; build()</text>
    <rect x="18" y="36" width="80" height="6" rx="3" fill="#9333EA"/>
    <rect x="104" y="36" width="28" height="6" rx="3" fill="#ffffff" fill-opacity="0.3"/>
  </g>
</svg>
